name: splitway_mobile
description: "Splitway — cronómetro inteligente para rutas. Iter 4: Auth + UI/UX."

publish_to: 'none'

version: 0.4.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.0
  splitway_core:
    path: ../packages/splitway_core
  geolocator: ^14.0.0
  go_router: ^17.3.0
  intl: ^0.20.0
  mapbox_maps_flutter: ^2.10.0
  sqflite: ^2.4.0
  supabase_flutter: ^2.8.0
  google_sign_in: ^7.2.0
  connectivity_plus: ^7.1.1
  http: ^1.3.0
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.0
  path: ^1.9.0
  path_provider: ^2.1.0
  uuid: ^4.5.3
  wakelock_plus: ^1.3.0
  flutter_foreground_task: ^9.2.2
  permission_handler: ^12.0.3
  share_plus: ^13.1.0
  audioplayers: ^6.1.0
  sensors_plus: ^7.0.0
  flutter_svg: ^2.3.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  # env/local.json is gitignored. Copy env/local.example.json to env/local.json
  # and uncomment the entry below to bundle real Mapbox/Supabase credentials.
  assets:
    - env/local.json
    - assets/sounds/
    - assets/icon/
