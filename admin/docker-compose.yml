services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: splitway-admin-dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./:/app
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    restart: unless-stopped

volumes:
  admin_node_modules:
  admin_next_cache:
